<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ JCM AI Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* Contenedor principal con efecto neón */
        .card {
            background: #111;
            padding: 50px 30px;
            border-radius: 40px;
            border: 2px solid #ff006e;
            box-shadow: 0px 0px 60px rgba(255, 0, 110, 0.3);
            max-width: 400px;
            width: 85%;
            transition: 0.4s;
        }

        h1 {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            margin: 0 0 15px 0;
            font-weight: 800;
        }

        p {
            color: #aaa;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Botón estilo DJ con brillo */
        .launch-btn {
            background: #ff006e;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0px 10px 30px rgba(255, 0, 110, 0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .launch-btn:hover {
            background: #8338ec;
            transform: scale(1.1);
            box-shadow: 0px 10px 40px rgba(131, 56, 236, 0.6);
        }

        .back-link {
            margin-top: 50px;
            color: #444;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #ff006e;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>DJ JCM AI</h1>
        <p>Willkommen! Klicke auf den Button, um das Gespräch mit meinem interaktiven KI-Avatar zu starten.</p>
        
        <button class="launch-btn" onclick="startAI()">Chat Starten</button>
    </div>

    <a href="index.html" class="back-link">← Zurück zur Webseite</a>

    <script>
        function startAI() {
            // URL con tu API KEY Premium y el ID de tu agente DJ Carlos
            const agentUrl = "https://app.heygen.com/video-agent/37499791-77bd-40a6-8c7a-ea9756ed34a4?api_key=sk_V2_hgu_kqs3ezam8d3_ECFwuhLLBuVnUMzitTLpyG4vZ6Gk11QC";
            
            // Abrimos en una ventana nueva para saltar los bloqueos de "cuadro negro"
            const width = 600;
            const height = 850;
            const left = (window.screen.width / 2) - (width / 2);
            const top = (window.screen.height / 2) - (height / 2);
            
            window.open(
                agentUrl, 
                "HeyGenDJJCM", 
                `width=${width},height=${height},top=${top},left=${left},menubar=no,toolbar=no,location=no,status=no`
            );
        }
    </script>

</body>
</html>
