<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ JCM AI Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        #heygen-container {
            width: 95%;
            max-width: 900px;
            height: 600px;
            border: 2px solid #ff006e;
            border-radius: 20px;
            overflow: hidden;
            background: #111;
            box-shadow: 0px 0px 30px rgba(255, 0, 110, 0.3);
        }
        .btn-direct {
            margin-top: 20px;
            padding: 12px 25px;
            background: #ff006e;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0px 4px 15px rgba(255, 0, 110, 0.4);
        }
        .btn-direct:hover {
            background: #8338ec;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Sprich mit DJ JCM</h1>
    <p style="color: #888;">Si el avatar no carga, pulsa el botón rosa de abajo</p>

    <div id="heygen-container">
        <iframe 
            src="https://app.heygen.com/video-agent/37499791-77bd-40a6-8c7a-ea9756ed34a4?embed=true" 
            width="100%" 
            height="100%" 
            style="border:none;" 
            allow="microphone; camera; autoplay; clipboard-write; encrypted-media; fullscreen;"
            sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-storage-access-by-user-activation"
        ></iframe>
    </div>

    <a href="https://app.heygen.com/video-agent/37499791-77bd-40a6-8c7a-ea9756ed34a4" target="_blank" class="btn-direct">
        🚀 Chat im Vollbild öffnen (Falls es nicht lädt)
    </a>

    <a href="index.html" style="margin-top: 20px; color: #555; text-decoration: none;">← Zurück</a>

</body>
</html>
