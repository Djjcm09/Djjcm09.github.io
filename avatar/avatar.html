<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ JCM AI Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        h1 {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: bold;
        }
        p {
            color: #ccc;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        #heygen-wrapper {
            width: 95%;
            max-width: 1000px;
            height: 750px;
            border: 2px solid #ff006e;
            border-radius: 25px;
            overflow: hidden;
            background: #000;
            box-shadow: 0px 0px 40px rgba(255, 0, 110, 0.4);
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .back-link {
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-link:hover {
            color: #ff006e;
        }
    </style>
</head>
<body>

    <h1>Sprich mit DJ JCM</h1>
    <p>Frage mich nach Hochzeiten, Denon-Equipment oder Terminen</p>

    <div id="heygen-wrapper">
        <iframe 
            src="https://app.heygen.com/video-agent/37499791-77bd-40a6-8c7a-ea9756ed34a4?embed=true" 
            allow="microphone; camera; clipboard-write; autoplay; fullscreen"
            title="DJ JCM Interactive Avatar">
        </iframe>
    </div>

    <a href="index.html" class="back-link">← Zurück zur Startseite</a>

</body>
</html>
