<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ JCM Avatar</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        /* Ajustamos el contenedor para que el agente de D-ID lo rellene */
        #did-container {
            width: 100%;
            height: 700px; /* Un poco más de altura para el chat */
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,0,110,0.3);
            margin: 2rem 0;
            background: #111;
            position: relative;
        }
        .back-link {
            color: #888;
            text-decoration: none;
            transition: color 0.3s;
            display: inline-block;
            margin-top: 1rem;
        }
        .back-link:hover {
            color: #ff006e;
        }
        
        /* Forzamos al agente a ocupar todo el contenedor */
        d-id-agent {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sprich mit DJ JCM</h1>
        <p>Stelle Fragen zu Preisen, Equipment, Musik oder Terminen</p>
        
        <div id="did-container">
            <d-id-agent
                id="d-id-agent"
                data-agent-id="agt_wXQLvH7o"
                data-client-key="Y2tfdGhTZ2ZDT1J6OElCMmhMSkhsTjYx">
            </d-id-agent>
        </div>
        
        <a href="../index.html" class="back-link">← Zurück zur Startseite</a>
    </div>

    <script
        type="module"
        src="https://unpkg.com/@d-id/client-sdk@latest/dist/d-id-agent.js">
    </script>
</body>
</html>
